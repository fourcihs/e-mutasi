<!DOCTYPE html>
<html>
<head>
    <title>Sistem Mutasi SMAN 4 Cimahi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #e0e5ec; /* Warna senada tema kita */
        }
        iframe {
            position: absolute;
            top: -45px; 
            left: 0; 
            width: 100%; 
            height: calc(100% + 45px); 
            border: none;
            padding-top: 45px; 
            padding-bottom: 65px; 
            box-sizing: border-box;
            /* Pastikan background iframe juga putih agar serasi */
            background: #e0e5ec;
        }
    </style>
</head>
<body>
    <div style="height: 45px; width: 100%;"></div>
        <iframe src="https://script.google.com/macros/s/AKfycbza5CsjijcV0YSuhD9zWK1daUnQcAvgmRrHT1_OK-aVRN8x38XesAvC5RzPIz-bBAuo/exec"></iframe>
    </div>
</body>
</html>
